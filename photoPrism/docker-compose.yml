services:
  photoprism: 
    image: photoprism/photoprism
    restart: always
    container_name: photoprism
    security_opt:
      - seccomp:unconfined
      - apparmor:unconfined
    ports:
    # web ui
      - 52342:2342
    # WebUI:
    volumes:
    # DATA : SERVICE IS ON AXLOTL!!!!!
    # /photoprism/storage generated files like cache and index (Keep cache, settings and database)
      - /mnt/appdata/photoprism:/photoprism/storage

    # Storage Path
    # use  fastpool  to speedup instead of HDD array.
      - /mnt/fastpool/photoprism/Import:/photoprism/import

      # - /mnt/fastpool/photoprism/Pictures:/photoprism/originals
      # I move the files to /mnt/fastpool/HomePhotos. Then  mount it to Photoprism .
      - /mnt/fastpool/HomePhotos:/photoprism/originals

      
    # Path to your images and storage folder
      # - /mnt/mydata/photoprism/Pictures:/photoprism/originals

    # Photo Import Folder:
    # Only if you want to use the Import function of PhotoPrism (ATTENTION: Don't put the import folder in a subdirectory of the storage folder for your images!)
      # - /mnt/mydata/photoprism/Import:/photoprism/import


    # no auto buidl script.  disable now
    # # inject with my built ui compoments. no auto buidl script now!
    #   - /mnt/appdata/photoprism/df-built-ui-componets:/opt/photoprism/assets/static/build:ro
    environment:
      - TZ=Asia/Taipei
    env_file:
      - .env
    # =========================================================================
    # 跨 stack 連到 ChatStack 的 ollama / new-api (給 vision.yml 用)
    # -------------------------------------------------------------------------
    # 為什麼需要這行:
    #   photoprism 在 photoprism_default 網路, ollama 在 chatstack_default 網路,
    #   兩個 bridge 網路不互通, 容器名互相解析不到.
    #
    # 走法 (路線 A: 繞 host):
    #   photoprism → host.docker.internal:43002 → host iptables NAT → ollama:11434
    #                                              ↑
    #               利用 ChatStack compose 已經把 ollama port 43002 expose 到 host
    #
    # 對應的 vision.yml 端點:
    #   ChatStack ollama:  http://host.docker.internal:43002/api/generate
    #   ChatStack new-api: http://host.docker.internal:43001/v1/chat/completions
    #
    # 替代方案 (路線 B, 沒採用): 把 photoprism 加進 chatstack_default external network
    #   優點是直連不繞 host, 缺點是兩 stack 耦合, 啟動需 chatstack network 存在.
    # =========================================================================
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "photoprism", "status"]
      interval: 60s
      timeout: 15s
      retries: 5
      start_period: 60s
    # NVIDIA GPU acceleration (official configuration)
    # Reference: https://docs.photoprism.app/getting-started/advanced/transcoding/
    deploy:
      resources:
        reservations:
          devices:
            - driver: "nvidia"
              capabilities: [gpu]
              count: 1


