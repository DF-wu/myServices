# author: df
# prepared: 2026-06-08
# description: Arcane manager evaluation deployment, isolated from existing Portainer ports.
# upstream compose ref: https://github.com/getarcaneapp/arcane/blob/v2.0.0/docker/examples/compose.basic.yaml
#
# Status: design / trial only. Do not treat this as the primary control plane yet.

name: arcane

services:
  arcane:
    image: ghcr.io/getarcaneapp/manager:v2.0.0
    container_name: arcane
    restart: unless-stopped
    ports:
      - "55004:3552"
    env_file:
      - path: ./compose.env
      - path: ./compose.env.local
        required: false
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /mnt/appdata/Arcane/data:/app/data
      - /mnt/appdata/Arcane/projects:/mnt/appdata/Arcane/projects
      - /mnt/appdata/Arcane/builds:/builds
    # Arcane upstream recommends host cgroup namespace for self container detection.
    cgroup: host
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3552/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
