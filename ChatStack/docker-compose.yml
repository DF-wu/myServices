  sillytavern:
    container_name: sillytavern
    hostname: sillytavern
    image: ghcr.io/sillytavern/sillytavern:latest
    environment:
      - NODE_ENV=production
      - FORCE_COLOR=1
      - PUID=3000
      - PGID=3000
    ports:
      - "43003:8000"
    volumes:
      - "/mnt/appdata/ChatStack/sillytarven/config:/home/node/app/config"
      - "/mnt/appdata/ChatStack/sillytarven/data:/home/node/app/data"
      - "/mnt/appdata/ChatStack/sillytarven/plugins:/home/node/app/plugins"
      - "/mnt/appdata/ChatStack/sillytarven/extensions:/home/node/app/public/scripts/extensions/third-party"
    restart: unless-stopped

  # author : df
  # AstrBot - AI-powered chatbot
  # doc: https://docs.astrbot.app/deploy/astrbot/docker.html
  astrbot:
    image: soulter/astrbot:latest
    container_name: astrbot
    restart: unless-stopped
    ports: # mappings description: https://github.com/AstrBotDevs/AstrBot/issues/497
      - "43004:6185" # 必选，AstrBot WebUI 端口
      # - "6199:6199" # 可选, QQ 个人号 WebSocket 端口
    environment:
      - TZ=Asia/Taipei
    volumes:
      - /mnt/appdata/ChatStack/astrbot/data:/AstrBot/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
  # astrbot sandbox
  shipyard:
    image: soulter/shipyard-bay:latest
    container_name: astrbot_shipyard
    # ports:
    #   - "8156:8156"
    environment:
      - PORT=8156
      - DATABASE_URL=sqlite+aiosqlite:///./data/bay.db
      - ACCESS_TOKEN=secret-token
      - MAX_SHIP_NUM=10
      - BEHAVIOR_AFTER_MAX_SHIP=reject
      - DOCKER_IMAGE=soulter/shipyard-ship:latest
      - DOCKER_NETWORK=astrbot_network
      - SHIP_DATA_DIR=/mnt/appdata/ChatStack/astrbot/data/shipyard/ship_mnt_data
      - DEFAULT_SHIP_CPUS=1.0
      - DEFAULT_SHIP_MEMORY=512m
    volumes:
      - /mnt/appdata/ChatStack/astrbot/data/shipyard/bay_data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock:ro

  cli-proxy-api:
    image: eceasy/cli-proxy-api:latest
    # image: eceasy/cli-proxy-api-plus:latest
    container_name: cli-proxy-api
    restart: unless-stopped
    network_mode: service:gluetun-proxy
    depends_on:
      - gluetun-proxy

    # because network interface is replaced by another container.
    # expose ports here will not work.
    # ports:
    #   - "8317:8317"
    volumes:
      - /mnt/appdata/CLIProxyAPI-plus/config.yaml:/CLIProxyAPI/config.yaml
      - /mnt/appdata/CLIProxyAPI-plus/auth:/root/.cli-proxy-api
      - /mnt/appdata/CLIProxyAPI-plus/logs:/CLIProxyAPI/logs

  gluetun-proxy:
    image: qmcgaw/gluetun
    container_name: gluetun-proxy
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - 19000:8888/tcp # HTTP proxy

      # for CLIproxyAPI-plus
      - 8317:8317
    volumes:
      - /mnt/appdata/gluetun:/gluetun
    environment:
      # 基本 VPN 設定 (必填)
      - VPN_SERVICE_PROVIDER=surfshark
      - VPN_TYPE=wireguard
      - OPENVPN_USER=${OPENVPN_USER}
      - OPENVPN_PASSWORD=${OPENVPN_PASSWORD}
      - WIREGUARD_PRIVATE_KEY=${SURFSHARK_WIREGUARD_PRIVATE_KEY}
      - WIREGUARD_ADDRESSES=10.14.0.2/16
      # - OPENVPN_CUSTOM_CONFIG=/gluetun/surfshark-ovpn/se-sto.prod.surfshark.com_udp.ovpn
      # - SERVER_COUNTRIES=Sweden
      - SERVER_CITIES=Phoenix
      # 系統設定
      - TZ=${TZ}
      - UMASK=000
      # ===== 修復 1: 關掉 DNS-over-TLS，改用 plaintext =====
      # DoT 通過高延遲 VPN 隧道 (台灣→Sweden ~340ms) TLS handshake 經常 reset
      - DOT=off
      - DNS_PLAINTEXT_ADDRESS=1.1.1.1
      # ===== 修復 2: 用 IP-based healthcheck，避免 DNS 依賴 =====
      # VPN tunnel 本身通 (ping OK)，但 DNS 暫時故障會誤觸 VPN 重啟→死亡螺旋
      - HEALTH_TARGET_ADDRESS=1.1.1.1:443
      - HEALTH_SUCCESS_WAIT_DURATION=15s
      # 伺服器選擇 (可選)
      # - SERVER_COUNTRIES="Romania"
      # - SERVER_REGIONS="București"
      # - SERVER_CITIES="Bucharest"
      # - SERVER_HOSTNAMES="ro2-auto-udp.ptoserver.com"

  # =============================================================================
  # Lilac - Discord AI Agent Runtime (js-llmcord successor)
  # repo: https://github.com/DF-wu/lilac-mono
  # doc: https://github.com/stanley2058/lilac-mono/blob/main/PROJECT.md
  # GHCR latest/claudia images use /home/Catalinna and /home/Claudia, not upstream /home/lilac.
  # Runtime state now lives under /data, including XDG config, git config, gpg, and bun/npm state.
  # =============================================================================
  lilac:
    container_name: lilac-mono
    image: ghcr.io/df-wu/lilac-mono
    restart: unless-stopped
    environment:
      - TZ=Asia/Taipei
      - LOG_LEVEL=debug
      - REDIS_URL=redis://chatstack-unified-redis:6379/5
      - DATA_DIR=/data
      - LILAC_WORKSPACE_DIR=/data/workspace
      - GIT_CONFIG_GLOBAL=/data/.gitconfig
      - GNUPGHOME=/data/secret/gnupg
      - BUN_INSTALL_GLOBAL_DIR=/data/.bun/install/global
      - BUN_INSTALL_BIN=/data/bin
      - BUN_INSTALL_CACHE_DIR=/data/.bun/install/cache
      - NPM_CONFIG_PREFIX=/data/.npm-global
      - XDG_CONFIG_HOME=/data/.config
      - LL_TOOL_SERVER_PORT=8080

      # GitHub webhook ingress (GitHub App)
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET:-}
      - GITHUB_WEBHOOK_PORT=${GITHUB_WEBHOOK_PORT:-8787}
      - GITHUB_WEBHOOK_PATH=${GITHUB_WEBHOOK_PATH:-/github/webhook}
      # Provider: OpenAI 
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_COMPATIBLE_BASE_URL=${OPENAI_COMPATIBLE_BASE_URL}
      - OPENAI_COMPATIBLE_API_KEY=${OPENAI_COMPATIBLE_API_KEY}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}

      # Discord bot token
      - DISCORD_TOKEN=${DISCORD_TOKEN}

      # web search key
      - EXA_API_KEY=${EXA_API_KEY}
      - EXA_API_BASE_URL=${EXA_API_BASE_URL}
      - TAVILY_API_BASE_URL=${TAVILY_API_BASE_URL}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      # weird empty string patch
      - LILAC_LLM_WIRE_DEBUG=${LILAC_LLM_WIRE_DEBUG:-0}
      - LILAC_LLM_WIRE_DEBUG_DIR=/data/debug/llm-wire
      - LILAC_LLM_WIRE_DEBUG_MAX_BODY_BYTES=65536
      - LILAC_LLM_WIRE_DEBUG_MAX_EVENTS=400




    volumes:
      - /mnt/appdata/ChatStack/lilac-mono/data:/data
      - /home/df/.agents:/home/Catalinna/.agents
      - /mnt/appdata/ChatStack/lilac-mono/.ssh:/home/Catalinna/.ssh
      # - /home/df/.ssh:/home/Catalinna/.ssh
      - /mnt/appdata/ChatStack/lilac-mono/data/.cache:/home/Catalinna/.cache
    depends_on:
      chatstack-unified-redis:
        condition: service_healthy
      new-api:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${LL_TOOL_SERVER_PORT:-8080}/healthz >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    ports:
      - "8787:8787" # GitHub webhook ingress
      # - "43090:8080"  # Uncomment to expose tool server externally


  lilac-claudia:
    container_name: lilac-mono-claudia
    image: ghcr.io/df-wu/lilac-mono:claudia
    restart: unless-stopped
    environment:
      - TZ=Asia/Taipei
      - LOG_LEVEL=debug
      - REDIS_URL=redis://chatstack-unified-redis:6379/7
      - DATA_DIR=/data
      - LILAC_WORKSPACE_DIR=/data/workspace
      - GIT_CONFIG_GLOBAL=/data/.gitconfig
      - GNUPGHOME=/data/secret/gnupg
      - BUN_INSTALL_GLOBAL_DIR=/data/.bun/install/global
      - BUN_INSTALL_BIN=/data/bin
      - BUN_INSTALL_CACHE_DIR=/data/.bun/install/cache
      - NPM_CONFIG_PREFIX=/data/.npm-global
      - XDG_CONFIG_HOME=/data/.config
      - LL_TOOL_SERVER_PORT=8080

      # GitHub webhook ingress (GitHub App)
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET_CLAUDIA:-}
      - GITHUB_WEBHOOK_PORT=${GITHUB_WEBHOOK_PORT:-8787}
      - GITHUB_WEBHOOK_PATH=${GITHUB_WEBHOOK_PATH:-/github/webhook}
      - GITHUB_TOKEN=${GITHUB_TOKEN_CLAUDIA}
      # Provider: OpenAI 
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY_CLAUDIA}
      - OPENAI_COMPATIBLE_BASE_URL=${OPENAI_COMPATIBLE_BASE_URL}
      - OPENAI_COMPATIBLE_API_KEY=${OPENAI_COMPATIBLE_API_KEY_CLAUDIA}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}

      # Discord bot token
      - DISCORD_TOKEN=${DISCORD_TOKEN_CLAUDIA}

      # web search key
      - EXA_API_KEY=${EXA_API_KEY}
      - EXA_API_BASE_URL=${EXA_API_BASE_URL}
      - TAVILY_API_BASE_URL=${TAVILY_API_BASE_URL}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      # weird empty string patch
      - LILAC_LLM_WIRE_DEBUG=${LILAC_LLM_WIRE_DEBUG:-0}
      - LILAC_LLM_WIRE_DEBUG_DIR=/data/debug/llm-wire
      - LILAC_LLM_WIRE_DEBUG_MAX_BODY_BYTES=65536
      - LILAC_LLM_WIRE_DEBUG_MAX_EVENTS=400

    volumes:
      - /mnt/appdata/ChatStack/lilac-mono-claudia/data:/data
      - /home/df/.agents:/home/Claudia/.agents
      - /mnt/appdata/ChatStack/lilac-mono-claudia/.ssh:/home/Claudia/.ssh
      - /mnt/appdata/ChatStack/lilac-mono/data/prompts/memory/homelab.md:/data/prompts/memory/homelab.md
      - /mnt/appdata/ChatStack/lilac-mono-claudia/data/.cache:/home/Claudia/.cache

  

    depends_on:
      chatstack-unified-redis:
        condition: service_healthy
      new-api:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${LL_TOOL_SERVER_PORT:-8080}/healthz >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    ports:
      - "8788:8787" # GitHub webhook ingress; container still listens on 8787
      # - "43090:8080"  # Uncomment to expose tool server externally
