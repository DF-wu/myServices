  # remember the different postgres version is not compatible
  chatstack-postgres17-pgvector:
    restart: unless-stopped
    image: pgvector/pgvector:pg17
    ports:
      - 43020:5432
    user: 3000:3000
    container_name: chatstack-postgres17-pgvector
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: openwebui_db
    volumes:
      - /mnt/appdata/ChatStack/postgres:/var/lib/postgresql/data

  # Qdrant vector database (per official Docker quick start)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: chatstack-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333" # REST API as documented
    environment:
      - TZ=Asia/Taipei
    volumes:
      - /mnt/appdata/ChatStack/qdrant/storage:/qdrant/storage
      - /mnt/appdata/ChatStack/qdrant/snapshots:/qdrant/snapshots
      # Uncomment after creating a custom config file (see qdrant docs)
      # - /mnt/appdata/ChatStack/qdrant/config/production.yaml:/qdrant/config/production.yaml:ro

  # 還在評估

  # chatgpt-telegram-bot:
