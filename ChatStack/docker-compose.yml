  # DEPRECATED.
  tika:
    image: apache/tika:latest-full
    container_name: tika
    user: 3000:3000
    restart: unless-stopped
    environment:
      - TZ=Asia/Taipei
    ports:
      - "59998:9998"
    depends_on:
      # 依賴 PostgreSQL 數據庫
      - chatstack-postgres17-pgvector

