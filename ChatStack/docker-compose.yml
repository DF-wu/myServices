  #       - TZ=Asia/Taipei
  # #      - NODE_TYPE=slave  # 多机部署时从节点取消注释该行
  # #      - SYNC_FREQUENCY=60  # 需要定期从数据库加载数据时取消注释该行
  # #      - FRONTEND_BASE_URL=https://openai.justsong.cn  # 多机部署时从节点取消注释该行=
  #       - DEBUG=true
  #       - GIN_MODE=debug

  # migrate to veloera https://github.com/Veloera/Veloera
  new-api:
    # newapi: calciumion/new-api:latest
    # image: ghcr.io/veloera/veloera:latest
    image: calciumion/new-api:latest
    container_name: new-api
    user: 3000:3000
    restart: always
    command: --log-dir /app/logs
    ports:
      - "43001:3000"
    volumes:
      - /mnt/appdata/ChatStack/new-api/data:/data
      - /mnt/appdata/ChatStack/new-api/logs:/app/logs
    environment:
      # 使用統一 Redis 的 Database 2
      - REDIS_CONN_STRING=redis://chatstack-unified-redis:6379/2
      - SESSION_SECRET=0 # 修改为随机字符串
      - TZ=Asia/Taipei
      #      - NODE_TYPE=slave  # 多机部署时从节点取消注释该行
      #      - SYNC_FREQUENCY=60  # 需要定期从数据库加载数据时取消注释该行
      #      - FRONTEND_BASE_URL=https://openai.justsong.cn  # 多机部署时从节点取消注释该行=
      - DEBUG=true
      - GIN_MODE=debug
      - BATCH_UPDATE_ENABLED=true
      - ERROR_LOG_ENABLED=true # 是否启用错误日志记录 (Whether to enable error log recording)
      # migrate to postgres from sqlite
      - SQL_DSN=postgres://postgres:postgres@chatstack-postgres17-pgvector:5432/veloera_db?sslmode=disable

    depends_on:
      chatstack-unified-redis:
        condition: service_started
      chatstack-postgres17-pgvector:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  # claude code router docker version.
  # doc: https://linux.do/t/topic/864277
  claude-code-router:
    image: yunxinc/ccr:latest
    container_name: ClaudeCodeRouter
    restart: unless-stopped
    ports:
      - "43056:3456" # ui in host /ui/
    volumes:
      - "/mnt/appdata/ChatStack/ccr/config.json:/root/.claude-code-router/config.json"
    environment:
      - TZ=Asia/Taipei

  # deploy claude relay service as converter
  claude-relay-service:
    image: weishaw/claude-relay-service:latest
    container_name: claude-relay-service
    restart: unless-stopped
    ports:
      - "43057:3000"
    environment:
      - PGID=3000
      - PUID=3000
      - JWT_SECRET=dfdfdfdfdfdfdfdfdfdfdfdfdfdfdfdf
      - ENCRYPTION_KEY=dfdfdfdfdfdfdfdfdfdfdfdfdfdfdfdf
      - REDIS_HOST=crs-redis
      - ADMIN_USERNAME=df
      - ADMIN_PASSWORD=df
    volumes:
      - /mnt/appdata/ChatStack/claudeRelayService/logs:/app/logs
      - /mnt/appdata/ChatStack/claudeRelayService/data:/app/data
    depends_on:
      - crs-redis

  crs-redis:
    image: docker.io/valkey/valkey:8-alpine
    container_name: claude-relay-redis
    user: 3000:3000
    environment:
      - PUID=3000
      - PGID=3000
    restart: unless-stopped
    expose:
      - 6379
    volumes:
      # persistant.  IDK WTF why CRS need persist on redis.
      - /mnt/appdata/ChatStack/claudeRelayService/redis:/data
    command: redis-server --save 60 1 --appendonly yes --appendfsync everysec
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # next-gen CRS: sub2api (migrate from claude-relay-service)
  # doc: https://github.com/Wei-Shaw/sub2api
  sub2api:
    # Faster than dockerhub wei-shaw/sub2api
    image: ghcr.io/wei-shaw/sub2api
    container_name: sub2api
    restart: unless-stopped
    ports:
      - "43062:8080"
    # allow using http://host.docker.internal:<port> inside containers
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /mnt/appdata/ChatStack/sub2api/data:/app/data
    environment:
      - AUTO_SETUP=true

      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8080
      - SERVER_MODE=release
      # - RUN_MODE=simple
      - TZ=Asia/Taipei

      # use existing ChatStack Postgres (pg17)
      # NOTE: you must create DB first (once): CREATE DATABASE sub2api;
      - DATABASE_HOST=chatstack-postgres17-pgvector
      - DATABASE_PORT=5432
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=postgres
      - DATABASE_DBNAME=sub2api
      - DATABASE_SSLMODE=disable

      # use ChatStack unified redis; allocate DB 6 for sub2api
      - REDIS_HOST=chatstack-unified-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=
      - REDIS_DB=6
      - REDIS_ENABLE_TLS=false

      - ADMIN_EMAIL=admin@sub2api.local
      - ADMIN_PASSWORD=${DF_PASSWORD:-df}

      # allow CRS sync base_url pointing to LAN / http (migration phase)
      - SECURITY_URL_ALLOWLIST_ENABLED=false
      - SECURITY_URL_ALLOWLIST_ALLOW_PRIVATE_HOSTS=true
      - SECURITY_URL_ALLOWLIST_ALLOW_INSECURE_HTTP=true
    depends_on:
      chatstack-postgres17-pgvector:
        condition: service_started
      chatstack-unified-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # chinrain api conversion proxy
  api-conversion:
    image: ghcr.io/chinrain/api-conversion:0.2.4
    container_name: api-conversion
    restart: unless-stopped
    ports:
      - "43061:8000"
    env_file:
      - .api-conversion.env
    environment:
      - TZ=Asia/Taipei
    volumes:
      - /mnt/appdata/ChatStack/api-conversion/data:/app/data
      - /mnt/appdata/ChatStack/api-conversion/logs:/app/logs

  # # Whisper-FastAPI - Speech-to-Text service (OpenAI Whisper-compatible)
