# lilac-mono / lilac-ai-core core runtime config example
#
# This file is a repo-local template for the runtime-side config that the lilac-mono
# containers consume. The actual deployed file usually lives in the persistent /data
# volume inside each instance, not in this repository.
#
# IMPORTANT:
# - Anthropic-native requests use the provider key `anthropic:` and model ids like
#   `anthropic/claude-sonnet-4-6`.
# - In lilac-ai-core, the Anthropic provider automatically POSTs to `${base_url}/messages`.
#   Therefore base_url should be the API prefix only. Do NOT append `/messages` yourself.
# - The docker-compose in this repo currently maps:
#     ANTHROPIC_BASE_URL <- OPENAI_COMPATIBLE_BASE_URL
#     ANTHROPIC_API_KEY  <- per-instance OPENAI_COMPATIBLE_API_KEY_*
#   This only works if your upstream/proxy accepts Anthropic Messages API on that same base URL.
#
# Suggested usage:
# - Keep one concrete copy per instance, e.g.:
#     /data/core-config-catalina.yaml
#     /data/core-config-claudia.yaml
# - Then adjust prompts / launcher / bootstrap logic to point each instance at its own file.

host: 0.0.0.0
port: 3000
max_steps: 15
log_level: info

auth:
  enabled: false
  secret:

dashboard_password:
execution_sandbox_endpoint:
execution_sandbox_opencode_server:

providers:
  # Native OpenAI provider.
  openai:
    base_url: https://api.openai.com/v1
    api_key: __OPENAI_API_KEY__
    api_schema: completion

  # OpenAI-compatible provider.
  # This can be your own router / relay / proxy speaking OpenAI wire format.
  openai-compatible:
    base_url: __OPENAI_COMPATIBLE_BASE_URL__
    api_key: __OPENAI_COMPATIBLE_API_KEY__

  # Anthropic-native provider.
  # In the current ChatStack deployment, this is intentionally pointed at the SAME upstream
  # as openai-compatible, but only valid if that upstream ALSO accepts Anthropic Messages API.
  anthropic:
    base_url: __ANTHROPIC_BASE_URL__
    api_key: __ANTHROPIC_API_KEY__

  openrouter:
    base_url: https://openrouter.ai/api/v1
    api_key: __OPENROUTER_API_KEY__

  x-ai:
    base_url: https://api.x.ai/v1
    api_key: __XAI_API_KEY__

  groq:
    base_url: https://api.groq.com/openai/v1
    api_key: __GROQ_API_KEY__

models:
  # ---------------------------------------------------------------------------
  # Reference OpenAI model profile.
  # Use this as the style baseline when comparing with the Anthropic examples below.
  # ---------------------------------------------------------------------------
  openai/gpt-5.4:
    reasoning_effort: high
    verbosity: medium
    # Standard model knobs that lilac-ai-core maps directly:
    max_tokens: 32768
    temperature: 0.8
    top_p: 0.95
    tools: function

  # ---------------------------------------------------------------------------
  # Anthropic-native examples for Catalina / Claudia.
  #
  # Note: provider key is still `anthropic`; the Catalina / Claudia split usually happens by
  #       giving each instance a different provider api_key in its own deployed config file.
  #       The model definition can be identical across both instances, or you can duplicate it
  #       under comments below for documentation clarity.
  #
  # `reasoning_effort`:
  # - lilac-ai-core will translate it to Anthropic `thinking.budget_tokens` automatically.
  # - Mapping today is roughly: low=1500, medium=6000, high=12000.
  #
  # Anthropic-only extras:
  # - anthropic_cache_control: enable prompt cache breakpoints on system messages.
  # - anthropic_cache_ttl: optional TTL, e.g. "1h".
  # - anthropic_cache_tools: whether tool definitions also receive Anthropic cache control.
  # ---------------------------------------------------------------------------

  anthropic/claude-sonnet-4-6:
    # GPT-5.4-style intent, translated for Anthropic-native requests.
    reasoning_effort: high
    # Anthropic path does NOT use OpenAI `verbosity`; do not expect GPT-5-style verbosity knobs
    # to have meaning here unless your upstream proxy implements its own translation layer.

    # Common generation knobs supported by lilac-ai-core:
    max_tokens: 32768
    temperature: 0.8
    top_p: 0.95
    # top_k is Anthropic-friendly and may be used if your upstream accepts it.
    # top_k: 40

    tools: function

    # Anthropic prompt caching.
    anthropic_cache_control: true
    # Optional TTL. Uncomment only if your upstream / account supports it.
    # anthropic_cache_ttl: "1h"

    # Whether tool definitions should also carry cache-control markers.
    anthropic_cache_tools: true

    # Explicit Anthropic thinking config. You may either keep this explicit block,
    # or rely on reasoning_effort mapping above. Keeping both makes intent obvious.
    thinking:
      type: enabled
      budget_tokens: 12000

  # Catalina deployment note:
  # - Use the SAME model id `anthropic/claude-sonnet-4-6`
  # - Set provider credentials in Catalina's deployed config to:
  #     providers.anthropic.base_url = OPENAI_COMPATIBLE_BASE_URL
  #     providers.anthropic.api_key  = OPENAI_COMPATIBLE_API_KEY_CATALINA
  #
  # Claudia deployment note:
  # - Use the SAME model id `anthropic/claude-sonnet-4-6`
  # - Set provider credentials in Claudia's deployed config to:
  #     providers.anthropic.base_url = OPENAI_COMPATIBLE_BASE_URL
  #     providers.anthropic.api_key  = OPENAI_COMPATIBLE_API_KEY_CLAUDIA

  # Optional OpenAI-compatible fallback using the same upstream.
  # This is useful if the upstream claims Anthropic support but actually only behaves correctly
  # through its OpenAI-compatible endpoint.
  openai-compatible/claude-sonnet-4-6:
    max_tokens: 32768
    temperature: 0.8
    top_p: 0.95
    tools: function
    # Do NOT put anthropic_cache_* here; those are only meaningful on the Anthropic-native path.

  # Optional smaller / cheaper writer model example.
  openai-compatible/gpt-5.4-mini:
    reasoning_effort: medium
    max_tokens: 16384
    temperature: 0.6
    tools: false

tools:
  default_tool_mode: function
  local_mcp:
    fetch:
      command: uvx
      args: ["mcp-server-fetch"]
      env: {}

system_prompt: |
  Replace this with the instance-specific system prompt.
  For Catalina and Claudia, keep separate deployed copies if their persona / memory routing differs.
