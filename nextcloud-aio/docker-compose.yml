name: nextcloud-aio

services:
  nextcloud-aio-mastercontainer:
    image: ghcr.io/nextcloud-releases/all-in-one:latest
    init: true
    restart: always
    container_name: nextcloud-aio-mastercontainer
    network_mode: bridge
    devices: ["/dev/dri"]
    volumes:
      - nextcloud_aio_mastercontainer:/mnt/docker-aio-config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "53080:80"
      - "8080:8080"
      - "58443:8443"
    environment:
      # Reverse proxy entrypoint. Keep APACHE_IP_BINDING on 0.0.0.0 because the
      # existing proxy stack reaches AIO through the published host port 11000.
      APACHE_PORT: "11000"
      APACHE_IP_BINDING: 0.0.0.0

      # Existing installation paths. Do not change NEXTCLOUD_DATADIR after the
      # first install unless you are deliberately migrating the data directory.
      NEXTCLOUD_DATADIR: /mnt/ncdata
      NEXTCLOUD_MOUNT: /mnt/

      # Current instance sizing.
      NEXTCLOUD_UPLOAD_LIMIT: 100G
      NEXTCLOUD_MAX_TIME: "10800"
      NEXTCLOUD_MEMORY_LIMIT: 16384M

      # Extra packages/extensions currently used by this deployment.
      NEXTCLOUD_ADDITIONAL_APKS: imagemagick gcc
      NEXTCLOUD_ADDITIONAL_PHP_EXTENSIONS: imagick

      # Requires Docker's nvidia runtime to be registered on the host.
      NEXTCLOUD_ENABLE_NVIDIA_GPU: "true"

volumes:
  nextcloud_aio_mastercontainer:
    name: nextcloud_aio_mastercontainer
