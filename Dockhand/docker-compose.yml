# author: df
# prepared: 2026-06-08
# description: Dockhand deployment for axolotl (prepared only, not deployed)
# doc: https://dockhand.pro/manual/
# notes:
# - Pin image tag instead of using latest.
# - Keep host path === container path for DATA_DIR and myServices repo.
#   This matches Dockhand's recommendation and helps imported/adopted stacks
#   keep relative paths / env_file behavior sane.
# - COMPOSE_TIMEOUT is raised because this host often pulls large images and
#   Portainer previously timed out during longer stack updates.

name: dockhand

services:
  dockhand:
    image: fnsys/dockhand:v1.0.32
    container_name: dockhand
    restart: unless-stopped
    ports:
      - "55002:3000"
    group_add:
      # axolotl docker group gid
      - "960"
    env_file:
      - path: ./compose.env
      - path: ./compose.env.local
        required: false
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /mnt/appdata/Dockhand:/mnt/appdata/Dockhand
      # Allow importing / adopting existing stacks from this repo with
      # matching paths, including stacks that use relative env files.
      - /home/df/workspace/myServices:/home/df/workspace/myServices
