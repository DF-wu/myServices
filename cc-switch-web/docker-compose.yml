# author: Catalina
# prepared: 2026-06-16
# description: cc-switch-web — 統一管理 Claude Code / Codex / Gemini CLI / OpenCode / OMO 的 Web UI。
# upstream: https://github.com/Laliet/cc-switch-web
# image: ghcr.io/laliet/cc-switch-web:0.17.0
#
# 這個 stack 的核心不是「靜態網站」，而是上游的 Rust/Axum Web Server。
# Docker image 內實際跑的是 `cc-switch-server`，前端 React/Vite 已經在 build 階段打包進去。
#
# 設計原則：
# - image tag 鎖定 0.17.0：上游 release note / package version 都是 0.17.0，Docker tag 也沿用不帶 v 的版本號。
# - host port 直接暴露 43064:3000：這是 myServices 常用的高位 port 風格；若要對外公開，再交給外層反代做 TLS。
# - 容器內一定綁 `HOST=0.0.0.0`：Docker port publish 的標準要求。
# - `ALLOW_HTTP_BASIC_OVER_HTTP=1` 必開：上游在非 loopback bind 時會擋啟動，這是明文 HTTP 的安全顯式確認。
# - 持久化分兩層：
#   1. `/home/ccswitch/.cc-switch` = cc-switch-web 自己的資料庫 / 密碼 / CSRF / 備份
#   2. `~/.claude` / `~/.codex` / `~/.gemini` / `~/.config/opencode` = 實際被 Web UI 接管的 CLI 設定目錄
#
# 關鍵路徑摘要（已根據上游原始碼驗證）：
# - `/home/ccswitch/.cc-switch/cc-switch.db`
# - `/home/ccswitch/.cc-switch/web_password`
# - `/home/ccswitch/.cc-switch/web_env`
# - `/home/ccswitch/.cc-switch/backups/`
# - `~/.claude` / `~/.codex` / `~/.gemini` / `~/.config/opencode`

services:
  cc-switch-web:
    image: ghcr.io/laliet/cc-switch-web:0.17.0
    container_name: cc-switch-web
    restart: unless-stopped
    init: true
    ports:
      - "${CC_SWITCH_WEB_PORT:-43064}:3000"
    environment:
      TZ: ${TZ:-Asia/Taipei}
      HOST: 0.0.0.0
      PORT: 3000
      ALLOW_HTTP_BASIC_OVER_HTTP: ${ALLOW_HTTP_BASIC_OVER_HTTP:-1}
      ENABLE_HSTS: ${ENABLE_HSTS:-false}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-}
      CORS_ALLOW_CREDENTIALS: ${CORS_ALLOW_CREDENTIALS:-}
      ALLOW_LAN_CORS: ${ALLOW_LAN_CORS:-}
    volumes:
      # cc-switch-web 自己的 runtime data：資料庫、密碼、CSRF token、備份都放這裡。
      - ${CC_SWITCH_WEB_DATA_DIR:-/mnt/appdata/cc-switch-web/data}:/home/ccswitch/.cc-switch

      # 下面這四條不是「示意」，而是實際啟用的接管掛載。
      # 這樣 Web UI 直接操作的是 DF 主機上的真實 CLI 設定，而不是容器內的空殼副本。
      - ${CLAUDE_DIR:-/home/df/.claude}:/home/ccswitch/.claude
      - ${CODEX_DIR:-/home/df/.codex}:/home/ccswitch/.codex
      - ${GEMINI_DIR:-/home/df/.gemini}:/home/ccswitch/.gemini
      - ${OPENCODE_DIR:-/home/df/.config/opencode}:/home/ccswitch/.config/opencode
