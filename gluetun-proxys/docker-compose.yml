version: "3.8"

# Gluetun Multi-Region Proxy Farm
# 透過 Surfshark WireGuard 連線，將各國 VPN 出口以 HTTP/SOCKS5/Shadowsocks Proxy 方式共享
# 適用於需要多個地區 IP 的應用場景

services:
  # ═══════════════════════════════════════════════════════════
  # 🇯🇵 日本 (Japan)
  # ═══════════════════════════════════════════════════════════
  gluetun-japan:
    image: qmcgaw/gluetun
    container_name: gluetun-japan
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - 19200:8888/tcp   # HTTP Proxy
      - 19201:8388/tcp   # Shadowsocks
      - 19201:8388/udp   # Shadowsocks UDP
      - 19202:1080/tcp   # SOCKS5
    volumes:
      - /mnt/appdata/gluetun-proxys/japan:/gluetun
    environment:
      # VPN Provider
      - VPN_SERVICE_PROVIDER=surfshark
      - VPN_TYPE=wireguard
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}
      - WIREGUARD_ADDRESSES=${WIREGUARD_ADDRESSES:-10.14.0.2/16}
      - SERVER_COUNTRIES=Japan
      # Proxy 設定
      - HTTPPROXY=on
      - SOCKS5_ENABLED=on
      - SHADOWSOCKS=on
      - SHADOWSOCKS_PASSWORD=${SHADOWSOCKS_PASSWORD:-changeme}
      - SHADOWSOCKS_CIPHER=${SHADOWSOCKS_CIPHER:-aes-256-gcm}
      # 系統設定
      - TZ=${TZ:-Asia/Taipei}
      - UMASK=000
      - UPDATER_PERIOD=24h
      # 效能優化：關閉非必要功能以降低記憶體使用 (~55MB per instance)
      - BLOCK_MALICIOUS=off
      - BLOCK_SURVEILLANCE=off
      - BLOCK_ADS=off
      - DOT=off
      # 允許區網存取 proxy（請依實際區網調整）
      - FIREWALL_OUTBOUND_SUBNETS=${LAN_SUBNET:-192.168.0.0/24}

  # ═══════════════════════════════════════════════════════════
