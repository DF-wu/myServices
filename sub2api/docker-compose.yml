# doc: https://github.com/Wei-Shaw/sub2api
# goal: migrate from claude-relay-service (CRS) -> sub2api, then switch Claude Code/OpenClaw base url.

services:
  sub2api:
    image: weishaw/sub2api:latest
    container_name: sub2api
    restart: unless-stopped
    ports:
      - "43062:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /mnt/appdata/sub2api/data:/app/data
    environment:
      # docker auto-setup
      - AUTO_SETUP=true

      # server
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8080
      - SERVER_MODE=release
      - RUN_MODE=simple
      - TZ=Asia/Taipei

      # postgres
      - DATABASE_HOST=sub2api-postgres
      - DATABASE_PORT=5432
      - DATABASE_USER=sub2api
      - DATABASE_PASSWORD=${DF_PASSWORD}
      - DATABASE_DBNAME=sub2api
      - DATABASE_SSLMODE=disable

      # redis
      - REDIS_HOST=sub2api-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=
      - REDIS_DB=0
      - REDIS_ENABLE_TLS=false

      # admin (auto-created on first run)
      - ADMIN_EMAIL=admin@sub2api.local
      - ADMIN_PASSWORD=${DF_PASSWORD}

      # recommended for long-term stability (leave empty to auto-generate)
      # - JWT_SECRET=
      # - TOTP_ENCRYPTION_KEY=

      # allow CRS sync base_url pointing to LAN / http (migration phase)
      - SECURITY_URL_ALLOWLIST_ENABLED=false
      - SECURITY_URL_ALLOWLIST_ALLOW_PRIVATE_HOSTS=true
      - SECURITY_URL_ALLOWLIST_ALLOW_INSECURE_HTTP=true
    depends_on:
      sub2api-postgres:
        condition: service_healthy
      sub2api-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  sub2api-postgres:
    image: postgres:16-alpine
    container_name: sub2api-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=sub2api
      - POSTGRES_PASSWORD=${DF_PASSWORD}
      - POSTGRES_DB=sub2api
      - TZ=Asia/Taipei
    volumes:
      - /mnt/appdata/sub2api/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sub2api -d sub2api"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  sub2api-redis:
    image: docker.io/valkey/valkey:8-alpine
    container_name: sub2api-redis
    restart: unless-stopped
    user: 3000:3000
    environment:
      - TZ=Asia/Taipei
    volumes:
      - /mnt/appdata/sub2api/redis:/data
    command: "valkey-server --save 60 1 --appendonly yes --appendfsync everysec"
    healthcheck:
      test: "[ $$(valkey-cli ping) = 'PONG' ]"
      start_period: 5s
      interval: 1s
      timeout: 3s
      retries: 5